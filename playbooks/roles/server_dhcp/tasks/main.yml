- name: install_server_dhcp
  ansible.builtin.apt:
    cache_valid_time: "{{ apt.cache }}"
    name:
      - kea-dhcp4-server

- name: template_server_dhcp
  ansible.builtin.template:
    src: kea-dhcp4.conf.j2
    dest: /etc/kea/kea-dhcp4.conf
    mode: "644"
  notify: handler_service_restart_dhcp
